<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ScholarKey</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="hd">
    <h1>ScholarKey</h1>
  </header>

  <section class="section">
    <p class="section__label">Access sources</p>
    <ul id="sources" class="sources"></ul>
    <div class="actions">
      <button type="button" id="add-institution" class="btn btn--ghost">🏛️ Add your institution</button>
      <button type="button" id="add-source"      class="btn btn--ghost">+ Custom source</button>
    </div>
  </section>

  <section class="section">
    <p class="section__label">Wikipedia badge</p>
    <label class="field-row">
      <span class="field-row__label">Language</span>
      <select id="wiki-lang">
        <option value="en">English</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
        <option value="it">Italiano</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
        <option value="ru">Русский</option>
        <option value="pt">Português</option>
        <option value="id">Bahasa Indonesia</option>
        <option value="pl">Polski</option>
        <option value="he">עברית</option>
      </select>
    </label>
    <label class="field-row">
      <input type="checkbox" id="show-badge">
      <span class="field-row__label">Show Wikipedia citation badge</span>
    </label>
  </section>

  <section class="section">
    <p class="section__label">Behavior</p>
    <label class="field-row">
      <input type="checkbox" id="scan-bare">
      <span class="field-row__label">Scan bare-text DOIs (e.g. <code>10.1234/foo</code>)</span>
    </label>
  </section>

  <section class="section">
    <p class="section__label">Shadow library URLs</p>
    <div class="refresh-row">
      <button type="button" id="refresh-urls" class="btn btn--ghost">↻ Update</button>
      <span class="refresh-info" title="Fetches latest URLs for Anna's Archive and Sci-Hub from their Wikipedia articles">ⓘ</span>
      <span id="refresh-status" class="refresh-status"></span>
    </div>
  </section>

  <footer class="ft">
    <button type="button" id="reset" class="btn btn--danger">Reset to defaults</button>
    <span id="status" class="status"></span>
  </footer>

  <div id="institution-modal" class="modal" hidden>
    <div class="modal__box">
      <div class="modal__header">
        <span class="modal__title">Add institution proxy</span>
        <button type="button" id="modal-close" class="modal__close" aria-label="Close">✕</button>
      </div>
      <input type="search" id="inst-search" class="modal__search"
             placeholder="Search by institution name or country…" autocomplete="off">
      <p id="inst-hint" class="modal__hint">Loading…</p>
      <ul id="inst-results" class="modal__results"></ul>
    </div>
  </div>

  <script src="defaults.js"></script>
  <script src="popup.js"></script>
</body>
</html>
